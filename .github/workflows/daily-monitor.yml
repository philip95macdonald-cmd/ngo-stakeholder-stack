name: Daily Themen-Monitor

on:
  schedule:
    # Jeden Morgen 7:00 Uhr MEZ (= 6:00 UTC, Sommerzeit: 5:00 UTC)
    - cron: "0 6 * * *"
  # Manuell ausloesbar: Actions-Tab → "Daily Themen-Monitor" → "Run workflow"
  workflow_dispatch:
    inputs:
      mode:
        description: "mock oder live"
        required: false
        default: "live"

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r tools/themen-monitor/requirements.txt

      - name: Config-Dateien vorbereiten
        run: |
          # Echte Configs nutzen wenn vorhanden, sonst Examples als Fallback
          [ -f configs/ngo.yaml ]     || cp configs/ngo.example.yaml     configs/ngo.yaml
          [ -f configs/sources.yaml ] || cp configs/sources.example.yaml  configs/sources.yaml
          [ -f configs/brevo.yaml ]   || cp configs/brevo.example.yaml    configs/brevo.yaml

      - name: .env aus GitHub Secrets generieren
        run: |
          cat > .env <<EOF
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          SMTP_TO=${{ secrets.SMTP_TO }}
          TWITTER_BEARER_TOKEN=${{ secrets.TWITTER_BEARER_TOKEN }}
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          LOG_LEVEL=INFO
          EOF

      - name: Themen-Monitor laufen lassen
        run: |
          MODE=${{ github.event.inputs.mode || 'live' }}
          FLAG="--live"
          [ "$MODE" = "mock" ] && FLAG="--mock"
          cd tools/themen-monitor
          python main.py $FLAG --send-mail

      - name: HTML-Report als Artefakt speichern
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: themen-monitor-report-${{ github.run_id }}
          path: output/themen-monitor/report-*.html
          retention-days: 30
